version: "3.9"
services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - .:/app
    working_dir: /app
    command: uvicorn dispatchlayer_api.main:app --host 0.0.0.0 --port 8000 --reload

  dashboard:
    build:
      context: apps/dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./apps/dashboard:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
