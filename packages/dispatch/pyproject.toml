[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "dispatchlayer-dispatch"
version = "0.1.0"
description = "DispatchLayer battery dispatch optimizer"
requires-python = ">=3.11"
dependencies = ["dispatchlayer-domain>=0.1.0", "dispatchlayer-predictive>=0.1.0"]

[tool.hatch.build.targets.wheel]
packages = ["src/dispatchlayer_dispatch"]
