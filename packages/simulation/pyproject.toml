[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "gridforge-simulation"
version = "0.1.0"
description = "GridForge Monte Carlo simulation tools"
requires-python = ">=3.11"
dependencies = ["gridforge-domain>=0.1.0", "walsh-predictive-core>=0.1.0", "gridforge-forecasting>=0.1.0"]

[tool.hatch.build.targets.wheel]
packages = ["src/gridforge_sim"]
