[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "dispatchlayer-adapter-nrel"
version = "0.1.0"
description = "DispatchLayer adapter for NREL PVWatts API"
requires-python = ">=3.11"
dependencies = ["dispatchlayer-domain>=0.1.0", "httpx>=0.24", "pydantic>=2.0", "pydantic-settings>=2.0"]

[tool.hatch.build.targets.wheel]
packages = ["src/dispatchlayer_adapter_nrel"]
