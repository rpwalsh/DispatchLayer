[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "gridforge-adapter-nasa-power"
version = "0.1.0"
description = "GridForge adapter for NASA POWER solar resource API"
requires-python = ">=3.11"
dependencies = ["gridforge-domain>=0.1.0", "httpx>=0.24", "pydantic>=2.0", "pydantic-settings>=2.0"]

[tool.hatch.build.targets.wheel]
packages = ["src/gridforge_adapter_nasa_power"]
