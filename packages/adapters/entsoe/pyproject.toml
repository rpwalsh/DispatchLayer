[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "gridforge-adapter-entsoe"
version = "0.1.0"
description = "GridForge adapter for ENTSO-E Transparency Platform API"
requires-python = ">=3.11"
dependencies = ["gridforge-domain>=0.1.0", "httpx>=0.24", "pydantic>=2.0", "pydantic-settings>=2.0"]

[tool.hatch.build.targets.wheel]
packages = ["src/gridforge_adapter_entsoe"]
