[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "dispatchlayer-connector-sitewise"
version = "0.1.0"
description = "DispatchLayer AWS IoT SiteWise read-only connector"
requires-python = ">=3.11"
dependencies = ["dispatchlayer-domain>=0.1.0"]

[tool.hatch.build.targets.wheel]
packages = ["src/dispatchlayer_connector_sitewise"]
