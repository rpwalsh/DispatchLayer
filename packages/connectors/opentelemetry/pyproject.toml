[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "dispatchlayer-connector-otel"
version = "0.1.0"
description = "DispatchLayer OpenTelemetry/OTLP platform observability connector (read-only)"
