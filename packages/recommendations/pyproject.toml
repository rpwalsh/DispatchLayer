[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "gridforge-recommendations"
version = "0.1.0"
description = "GridForge evidence-ranked operational recommendations"
requires-python = ">=3.11"
dependencies = ["gridforge-domain>=0.1.0", "gridforge-predictive>=0.1.0", "gridforge-anomaly>=0.1.0"]

[tool.hatch.build.targets.wheel]
packages = ["src/gridforge_recommendations"]
