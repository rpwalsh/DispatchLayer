[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "gridforge-domain"
version = "0.1.0"
description = "GridForge domain models and protocols"
requires-python = ">=3.11"
dependencies = ["pydantic>=2.0"]

[tool.hatch.build.targets.wheel]
packages = ["src/gridforge_domain"]
